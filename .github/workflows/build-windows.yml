name: Build Windows

# Roda manualmente (workflow_dispatch) OU ao dar push numa tag v* (ex: v0.1.1).
# Em tag: publica os instaladores na aba "Releases". Em run manual: sobe como artifact.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # necessário para criar/atualizar o Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências do front
        run: npm install

      # Credenciais OAuth (gitignored) vêm do secret GOOGLE_CLIENT_JSON.
      - name: Gravar credenciais do Google
        shell: bash
        run: |
          if [ -z "$GOOGLE_CLIENT_JSON" ]; then
            echo "::error::Secret GOOGLE_CLIENT_JSON não configurado."
            exit 1
          fi
          printf '%s' "$GOOGLE_CLIENT_JSON" > src-tauri/google_client.json
        env:
          GOOGLE_CLIENT_JSON: ${{ secrets.GOOGLE_CLIENT_JSON }}

      - name: Build (tauri)
        run: npm run tauri build

      # Run manual: instalador como artifact (temporário).
      - name: Publicar instaladores (artifact)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: calendar-notifier-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Tag v*: publica um Release com os instaladores + notas automáticas.
      - name: Publicar Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
