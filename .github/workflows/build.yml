name: Build

# Roda manualmente (workflow_dispatch) OU ao dar push numa tag v* (ex: v0.3.0).
# Usa a tauri-action, que compila, ASSINA os artefatos do updater e gera o
# latest.json na Release — habilitando o auto-update do app.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-latest
            args: "--bundles deb appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dependências do sistema (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf xdg-utils libglib2.0-dev

      - name: Instalar dependências do front
        run: npm install

      - name: Gravar credenciais do Google
        shell: bash
        run: |
          if [ -z "$GOOGLE_CLIENT_JSON" ]; then
            echo "::error::Secret GOOGLE_CLIENT_JSON não configurado."; exit 1
          fi
          printf '%s' "$GOOGLE_CLIENT_JSON" > src-tauri/google_client.json
        env:
          GOOGLE_CLIENT_JSON: ${{ secrets.GOOGLE_CLIENT_JSON }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # chave do updater (grátis, gerada com `tauri signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Calendar Notifier ${{ github.ref_name }}"
          releaseBody: "Baixe o instalador da sua plataforma nos arquivos abaixo."
          releaseDraft: false
          # builds manuais (workflow_dispatch) saem como prerelease p/ não virarem
          # a "latest" que o auto-update consome
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          args: ${{ matrix.args }}
